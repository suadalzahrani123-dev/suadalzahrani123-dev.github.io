<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ضيفنا</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Tajawal', sans-serif;
background:#0b1f2a;
color:white;
}

/* HERO */
.hero{
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center;
background-size:cover;
height:400px;
position:relative;
display:flex;
align-items:center;
padding:40px;
}

.hero::after{
content:"";
position:absolute;
inset:0;
background:rgba(0,0,0,0.5);
}

.hero-content{
position:relative;
z-index:2;
max-width:400px;
}

.hero h1{
font-size:34px;
margin:0;
}

.hero p{
opacity:0.8;
margin:10px 0;
}

.hero button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#00c2a8;
color:white;
cursor:pointer;
}

/* SECTION أبيض */
.section{
background:white;
color:#111;
padding:40px 20px;
}

/* صور */
.grid{
display:flex;
gap:15px;
}

.grid img{
width:33%;
border-radius:15px;
}

/* مزايا */
.features{
background:#0f2d3a;
display:flex;
justify-content:space-around;
padding:30px 10px;
}

.feature{
text-align:center;
max-width:120px;
}

/* كروت */
.cards{
display:flex;
gap:15px;
overflow-x:auto;
padding:20px;
background:white;
color:black;
}

.card{
min-width:200px;
border-radius:15px;
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card .text{
position:absolute;
bottom:0;
background:linear-gradient(transparent, rgba(0,0,0,0.7));
color:white;
width:100%;
padding:10px;
}

/* الخريطة */
.map-section{
padding:30px;
background:#0b1f2a;
}

.map-box{
width:100%;
height:250px;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
}

input, select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:10px;
border:none;
}

button.full{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#00c2a8;
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<h1>ضيفنا</h1>
<p>تجربة سياحية متكاملة في السعودية</p>
<button>ابدأ</button>
</div>
</div>

<!-- صور -->
<div class="section">
<div class="grid">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98">
</div>
</div>

<!-- مزايا -->
<div class="features">
<div class="feature">مرشدين محترفين</div>
<div class="feature">أنشطة متنوعة</div>
<div class="feature">تجارب VIP</div>
<div class="feature">حجز سريع</div>
</div>

<!-- كروت -->
<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="text">تجارب بحرية</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<div class="text">جولات جبلية</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1493558103817-58b2924bce98">
<div class="text">مرشد خاص</div>
</div>

</div>

<!-- خريطة جدة + طلب -->
<div class="map-section">

<div class="map-box">
<iframe
width="100%"
height="100%"
src="https://maps.google.com/maps?q=jeddah&t=&z=13&ie=UTF8&iwloc=&output=embed">
</iframe>
</div>

<select>
<option>مرشد حر</option>
<option>مرشد تجربة</option>
</select>

<select>
<option>1 ساعة</option>
<option>2 ساعات</option>
<option>4 ساعات</option>
</select>

<button class="full">طلب مرشد</button>

</div>

</body>
</html>
