<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ضيفنا</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Tajawal', sans-serif;
background:#0f3d3e;
display:flex;
justify-content:center;
}

/* شاشة جوال */
.phone{
width:360px;
height:720px;
background:#123;
border-radius:30px;
overflow:hidden;
}

/* الهيدر */
.header{
padding:20px;
}

.title{
font-size:22px;
font-weight:bold;
}

/* البحث */
.search{
padding:0 20px;
}

.search input{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#1f4f50;
color:white;
}

/* الكروت */
.card{
margin:15px 20px;
border-radius:20px;
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.overlay{
position:absolute;
bottom:0;
width:100%;
padding:15px;
background:linear-gradient(transparent, rgba(0,0,0,0.8));
}

.name{
font-weight:bold;
}

.price{
color:#00c2a8;
}

/* سفلي */
.bottom{
position:absolute;
bottom:0;
width:100%;
background:#123;
display:flex;
justify-content:space-around;
padding:10px 0;
}
</style>

</head>

<body>

<div class="phone">

<div class="header">
<div>مرحبًا</div>
<div class="title">ضيفنا</div>
</div>

<div class="search">
<input placeholder="ابحث عن تجربة">
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<div class="overlay">
<div class="name">تجربة بحرية - جدة</div>
<div class="price">من 130 ريال</div>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<div class="overlay">
<div class="name">جولة جبلية - العلا</div>
<div class="price">200 ريال</div>
</div>
</div>

<div class="bottom">
<div>الرئيسية</div>
<div>مرشد</div>
<div>مفضلة</div>
<div>إعدادات</div>
</div>

</div>

</body>
</html>
