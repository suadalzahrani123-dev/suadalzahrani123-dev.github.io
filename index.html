<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ضيفنا</title>

<style>

body{
margin:0;
font-family:Arial;
direction:rtl;
background:#f5f7fa;
}

/* ====== HERO ====== */
.hero{
height:90vh;
background:url("https://images.unsplash.com/photo-1500375592092-40eb2168fd21") center/cover;
display:flex;
align-items:center;
padding:60px;
color:white;
}

.hero h1{
font-size:48px;
margin:0;
}

/* ====== GALLERY ====== */
.gallery{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:60px;
background:white;
}

.left img{
width:100%;
height:460px;
object-fit:cover;
border-radius:15px;
}

.right{
display:flex;
flex-direction:column;
gap:20px;
}

.right img{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
}

/* ====== BLUE SECTION ====== */
.features{
background:#0d1b2a;
color:white;
padding:40px;
display:flex;
justify-content:space-around;
text-align:center;
}

.features div{
width:22%;
}

/* ====== CARDS ====== */
.cards{
display:flex;
gap:20px;
padding:60px;
}

.card{
flex:1;
position:relative;
border-radius:15px;
overflow:hidden;
cursor:pointer;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card span{
position:absolute;
bottom:10px;
right:10px;
color:white;
font-size:20px;
}

/* ====== MAP ====== */
.map{
padding:60px;
}

iframe{
width:100%;
height:300px;
border:none;
border-radius:15px;
}

button{
margin-top:20px;
padding:15px;
background:#00bfa6;
border:none;
color:white;
width:100%;
border-radius:10px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- HERO -->
<section class="hero">
<h1>ضيفنا</h1>
</section>

<!-- GALLERY -->
<section class="gallery">

<div class="left">
<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">
</div>

<div class="right">
<img src="https://images.unsplash.com/photo-1472214103451-9374bd1c798e">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
</div>

</section>

<!-- FEATURES -->
<section class="features">
<div>مرشدين محليين</div>
<div>تجارب مميزة</div>
<div>حجز فوري</div>
<div>دعم مباشر</div>
</section>

<!-- CARDS -->
<section class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<span>جولة طبيعية</span>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<span>رحلة بحرية</span>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1470770841072-f978cf4d019e">
<span>تجربة تاريخية</span>
</div>

</section>

<!-- MAP -->
<section class="map">
<iframe src="https://maps.google.com/maps?q=Jeddah&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
<button>طلب مرشد الآن</button>
</section>

</body>
</html>
