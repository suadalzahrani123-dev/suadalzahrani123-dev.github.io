<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>ضيفنا</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
body{background:#0b1d2a;color:white;}

/* HERO */
.hero{
height:80vh;
background:url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e") center/cover no-repeat;
display:flex;
align-items:center;
padding:60px;
}

.hero h1{font-size:50px;}
.hero p{margin:10px 0;}

/* CARDS */
.cards{
padding:60px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
height:250px;
border-radius:15px;
background-size:cover;
background-position:center;
cursor:pointer;
position:relative;
overflow:hidden;
}

.card::after{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
}

.card span{
position:absolute;
bottom:15px;
right:15px;
z-index:2;
font-size:20px;
}

/* MODAL (التفاصيل) */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
color:black;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
}

.modal button{
margin-top:15px;
padding:10px 20px;
background:#00c2a8;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<div>
<h1>ضيفنا</h1>
<p>احجز مرشد بسهولة</p>
</div>
</div>

<!-- CARDS -->
<div class="cards">

<div class="card" onclick="openDetails('جولة تاريخية')"
style="background-image:url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e')">
<span>جدة التاريخية</span>
</div>

<div class="card" onclick="openDetails('رحلة بحرية')"
style="background-image:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e')">
<span>رحلة بحرية</span>
</div>

<div class="card" onclick="openDetails('جولة مدينة')"
style="background-image:url('https://images.unsplash.com/photo-1500375592092-40eb2168fd21')">
<span>جولة مدينة</span>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h2 id="title"></h2>

<p>اختر موقعك:</p>
<input id="location" placeholder="اكتب موقعك" style="padding:10px; width:100%; margin:10px 0;">

<button onclick="confirmBooking()">تأكيد الحجز</button>
<button onclick="closeModal()">إغلاق</button>

</div>
</div>

<script>

function openDetails(type){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=type;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}

function confirmBooking(){
let loc = document.getElementById("location").value;

if(loc === ""){
alert("اكتب موقعك");
return;
}

alert("تم حجز " + document.getElementById("title").innerText + " في " + loc);
closeModal();
}

</script>

</body>
</html>
