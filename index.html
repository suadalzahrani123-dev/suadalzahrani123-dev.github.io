<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ضيفنا</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Tajawal', sans-serif;
background:url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e') no-repeat center;
background-size:cover;
color:white;
}

/* طبقة تغبيش */
.overlay{
background:rgba(0,0,0,0.6);
min-height:100vh;
padding:20px;
}

/* العنوان */
.header{
font-size:32px;
font-weight:bold;
text-align:center;
margin-top:20px;
}

.sub{
text-align:center;
opacity:0.8;
margin-bottom:20px;
}

/* كروت */
.container{
display:flex;
flex-direction:column;
gap:15px;
}

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
border-radius:20px;
padding:15px;
}

/* مدخلات */
input, select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin-bottom:10px;
background:#1f3a3a;
color:white;
}

/* زر */
button{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#00c2a8;
color:white;
cursor:pointer;
}

/* عنوان داخل كرت */
.title{
font-weight:bold;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="overlay">

<div class="header">ضيفنا</div>
<div class="sub">لتجربة سياحية متكاملة</div>

<div class="container">

<!-- 1️⃣ حجز مرشد -->
<div class="card">
<div class="title">حجز مرشد سياحي</div>

<button onclick="getLocation()">تحديد موقعي</button>
<p id="loc"></p>

<select>
<option>مرشد حر</option>
<option>مرشد تجربة</option>
</select>

<select>
<option>1 ساعة</option>
<option>2 ساعات</option>
<option>4 ساعات</option>
</select>

<button onclick="findGuide()">طلب مرشد</button>

<div id="guide"></div>
</div>

<!-- 2️⃣ الأنشطة -->
<div class="card">
<div class="title">أنشطة قريبة</div>

<p>الجري - كورنيش جدة</p>
<p>ركوب الخيل</p>
<p>فعاليات موسمية</p>
</div>

<!-- 3️⃣ VIP -->
<div class="card">
<div class="title">تجارب استثنائية</div>

<p>كواليس حفل غنائي</p>
<p>كواليس مباراة الجوهرة</p>
</div>

<!-- 4️⃣ مساعد -->
<div class="card">
<div class="title">مساعد ذكي</div>

<input id="q" placeholder="اسأل عن الأنشطة">
<button onclick="answer()">إرسال</button>

<p id="a"></p>
</div>

</div>

</div>

<script>

let lat, lng;

function getLocation(){
navigator.geolocation.getCurrentPosition(function(pos){
lat = pos.coords.latitude;
lng = pos.coords.longitude;

document.getElementById("loc").innerText =
"موقعك: " + lat.toFixed(4) + "," + lng.toFixed(4);
});
}

function findGuide(){
document.getElementById("guide").innerHTML =
"مرشد قريب - تقييم 4.8 - يصل خلال 5 دقائق";
}

function answer(){
let q = document.getElementById("q").value;

if(q.includes("قريب")){
document.getElementById("a").innerText="أقرب نشاط: كورنيش جدة";
}else{
document.getElementById("a").innerText="جربي اسألي عن الأنشطة القريبة";
}
}

</script>

</body>
</html>
