<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>منصة سياحية</title>

<style>
body {

font-family: Arial;
color: white;
text-align: center;
background: url('https://images.unsplash.com/photo-1580674285054-bed31e145f59') no-repeat center;
background-size: cover;
}

.overlay {
background: rgba(0,0,0,0.6);
height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
}

h1 {

}

padding: 12px;

}

button {
padding: 12px 25px;
margin-top: 15px;

border-radius: 10px;

}

</head>

<body>

<div class="overlay">
<h1>🌍 منصة سياحية متكاملة</h1>
<p>ضيفنا لتجربة سياحية متكاملة</p>

<input placeholder="ابحث عن تجربة أو مرشد">
<br>

</html>
